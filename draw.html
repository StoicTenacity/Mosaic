<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drawing App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
        <label>Color:
            <input type="color" id="colorPicker" value="#000000">
        </label>
        <label>Size:
            <input type="range" id="sizePicker" min="1" max="20" value="5">
        </label>
		
		
		<label>Tool:
			<select id="toolSelect">
			<option value="pen">Pen</option>
			<option value="eraser">Eraser</option>
			<option value="bucket">Paint Bucket</option>
			<option value="line">Line</option>
			<option value="rect">Rectangle</option>
			</select>
		</label>
		
		
        <button id="clearBtn">Clear</button>
		
		
		<button id="undoBtn">Undo</button>
		<button id="redoBtn">Redo</button>
		
		
		<button id="saveBtn">Save PNG</button>
		<input type="file" id="loadInput" accept="image/*" style="display:none;">
		
		<button id="saveAsBtn">Save As</button>
		
		<button id="loadBtn">Load Image</button>
		
		
		
		
    </div>
    <canvas id="drawCanvas"></canvas>

    <script src="draw.js"></script>
</body>
</html>
